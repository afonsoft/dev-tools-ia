services:
  openhands:
    image: docker.openhands.dev/openhands/openhands:1.5
    container_name: openhands-hands-app
    pull_policy: always
    init: true
    environment:
      LOG_ALL_EVENTS: "false"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      # Use custom runtime image instead of default
      # SANDBOX_BASE_CONTAINER_IMAGE: "dev-dotnet-tools-runtime:latest"
      # Keep these as fallback
      AGENT_SERVER_IMAGE_REPOSITORY: "ghcr.io/openhands/agent-server"
      AGENT_SERVER_IMAGE_TAG: "1.12.0-python"
      OPENHANDS_LLM_PROVIDER: gemini
      OPENHANDS_LLM_MODEL: gemini/gemini-2.5-flash
      OPENHANDS_LLM_TEMPERATURE: 0.35
      OPENHANDS_LLM_TOP_P: 0.95
      OPENHANDS_MAX_ITERATIONS: 30
      OPENHANDS_ENABLE_AUTO_LINT: true
      # Configurações de Workspace
      WORKSPACE_MOUNT_PATH: /workspace
      WORKSPACE_BASE: /workspace
      OPENHANDS_LLM_GPU_LAYERS: 33
      OPENHANDS_LOAD_TIMEOUT: 400
      OPENHANDS_MAX_PARALLEL_REQUESTS: 3
      OPENHANDS_MEMORY_BUDGET: 4294967296
      # Performance
      CUDA_VISIBLE_DEVICES: 0
      # Otimizações de memória
      SANDBOX_TIMEOUT: 240
      SANDBOX_USER_ID: "0"
      SANDBOX_MEMORY_LIMIT: "16g"
      SANDBOX_CPU_LIMIT: "2.0"
      SANDBOX_USE_HOST_NETWORK: true
      WORKSPACE_TIMEOUT: 400
      MAX_WORKSPACE_SIZE: "8g"
      SANDBOX_MAX_NUM_SANDBOXES: 5
      SANDBOX_NETWORK_MODE: "bridge"
    ports:
      - "3000:3000"
    volumes:
      - ./workspace:/workspace
      - ./openhands:/.openhands
      - ./openhands/config.toml:/config.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - openhands-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Ajustes para Windows
    tty: true
    stdin_open: true
    # Suporte GPU NVIDIA
    runtime: nvidia
    deploy:
      resources:
        limits:
          memory: "2g"
          cpus: "1.5"
        reservations:
          memory: "1g"
          cpus: "1.0"
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  openhands-net:
    name: openhands-net
    driver: bridge
