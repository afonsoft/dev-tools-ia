services:
  openhands:
    image: docker.openhands.dev/openhands/openhands:1.5
    container_name: openhands-hands-app
    pull_policy: always
    init: true
    environment:
      LOG_ALL_EVENTS: "false"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      # Use custom runtime image instead of default
      SANDBOX_BASE_CONTAINER_IMAGE: "dev-dotnet-tools-runtime:latest"
      # Keep these as fallback
      #AGENT_SERVER_IMAGE_REPOSITORY: "ghcr.io/openhands/agent-server"
      #AGENT_SERVER_IMAGE_TAG: "1.12.0-python"
      OPENHANDS_LLM_PROVIDER: gemini
      OPENHANDS_LLM_MODEL: gemini/gemini-2.5-flash
      OPENHANDS_LLM_TEMPERATURE: 0.2
      OPENHANDS_LLM_TOP_P: 0.95
      OPENHANDS_MAX_ITERATIONS: 25
      OPENHANDS_ENABLE_AUTO_LINT: true
      # Configurações de Workspace
      WORKSPACE_MOUNT_PATH: /workspace
      WORKSPACE_BASE: /workspace
      OPENHANDS_LLM_GPU_LAYERS: 33
      OPENHANDS_LOAD_TIMEOUT: 300
      OPENHANDS_MAX_PARALLEL_REQUESTS: 1
      OPENHANDS_MEMORY_BUDGET: 3435973836
      # Performance
      CUDA_VISIBLE_DEVICES: 0
      # Otimizações de memória
      SANDBOX_TIMEOUT: 180
      SANDBOX_USER_ID: "0"
      SANDBOX_MEMORY_LIMIT: "16g"
      SANDBOX_CPU_LIMIT: "2.0"
      WORKSPACE_TIMEOUT: 300
      MAX_WORKSPACE_SIZE: "8g"
    ports:
      - "3000:3000"
    volumes:
      - ./workspace:/workspace
      - ./openhands:/.openhands
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - openhands-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Ajustes para Windows
    tty: true
    stdin_open: true
    # Removido devices, runtime nvidia e healthcheck para compatibilidade local
    deploy:
      resources:
        limits:
          memory: "1.5g"
          cpus: "1.2"
        reservations:
          memory: "768m"
          cpus: "0.8"
  # Definição da rede

  runtime:
    build:
      context: ./runtime
      dockerfile: Dockerfile
    image: dev-dotnet-tools-runtime:latest
    container_name: openhands-runtime
    stdin_open: true
    tty: true
    networks:
      - openhands-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  openhands-net:
    name: openhands-net
    driver: bridge
