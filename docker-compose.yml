services:
  openhands:
    image: docker.openhands.dev/openhands/openhands:1.5
    container_name: openhands-app
    pull_policy: always
    environment:
      LOG_ALL_EVENTS: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      # OpenHands Agent Server Configuration
      AGENT_SERVER_IMAGE_REPOSITORY: "ghcr.io/openhands/agent-server"
      AGENT_SERVER_IMAGE_TAG: "1.12.0-python"
      # Gemini LLM Configuration
      OPENHANDS_LLM_PROVIDER: "gemini"
      OPENHANDS_LLM_MODEL: "gemini/gemini-2.5-flash"
      OPENHANDS_LLM_TEMPERATURE: 0.35
      OPENHANDS_LLM_TOP_P: 0.95
      OPENHANDS_MAX_ITERATIONS: 30
      OPENHANDS_ENABLE_AUTO_LINT: true
      OPENHANDS_LLM_GPU_LAYERS: 33
      OPENHANDS_LOAD_TIMEOUT: 400
      OPENHANDS_MAX_PARALLEL_REQUESTS: 3
      OPENHANDS_MEMORY_BUDGET: 4294967296
      # GPU Configuration
      CUDA_VISIBLE_DEVICES: all
      NVIDIA_VISIBLE_DEVICES: all
      # Sandbox Configuration
      SANDBOX_TIMEOUT: 240
      SANDBOX_USER_ID: "0"
      SANDBOX_MEMORY_LIMIT: "16g"
      SANDBOX_CPU_LIMIT: "2.0"
      SANDBOX_DOCKER_RUNTIME: nvidia
      SANDBOX_MAX_NUM_SANDBOXES: 1
      SANDBOX_NETWORK_MODE: "bridge"
      SANDBOX_ADDITIONAL_NETWORKS: "['openhands-net']"
      WORKSPACE_TIMEOUT: 400
    ports:
      - "3000:3000"
    volumes:
      - ./openhands:/.openhands
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Suporte GPU NVIDIA
    runtime: nvidia
    deploy:
      resources:
        limits:
          memory: "2g"
          cpus: "1.5"
        reservations:
          memory: "1g"
          cpus: "1.0"
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - openhands-net

networks:
  openhands-net:
    name: openhands-net
    driver: bridge
