version: "3.9"

services:
  openhands:
    image: docker.openhands.dev/openhands/openhands:1.4
    container_name: openhands-hands-app
    pull_policy: always
    environment:
      LOG_ALL_EVENTS: "true"
      # Configurações do LLM otimizadas para RTX 2050 + Qwen 2.5 Coder 7B
      OPENHANDS_LLM_PROVIDER: ollama
      OPENHANDS_LLM_MODEL: qwen2.5-coder:7b-instruct-q4_K_M
      OPENHANDS_LLM_ENDPOINT: http://ollama:11434
      OPENHANDS_LLM_TEMPERATURE: 0.1 # Mais determinístico para código
      OPENHANDS_LLM_TOP_P: 0.9
      OPENHANDS_MAX_ITERATIONS: 30 # Reduzido para economizar VRAM
      OPENHANDS_ENABLE_AUTO_LINT: true # Auto-lint do código
      # Configurações de Workspace (sem runtime customizado)
      WORKSPACE_MOUNT_PATH: /workspace
      WORKSPACE_BASE: /workspace
      # Otimizações para RTX 2050 4GB VRAM
      OPENHANDS_LLM_GPU_LAYERS: 35 # Ajustado para 4GB VRAM
      OPENHANDS_LLM_CTX_SIZE: 4096 # Reduzido para não sobrecarregar
      OPENHANDS_LOAD_TIMEOUT: 600 # Timeout aumentado
      OPENHANDS_MAX_PARALLEL_REQUESTS: 1 # Sequencial para economizar VRAM
      OPENHANDS_MEMORY_BUDGET: 4294967296 # 4GB total memory budget
      # Performance
      CUDA_VISIBLE_DEVICES: 0
      # Otimizações de memória para low-resource systems
      SANDBOX_TIMEOUT: 300 # 5 minutos timeout para sandbox
      SANDBOX_USER_ID: "0" # Root user para compatibilidade
      SANDBOX_MEMORY_LIMIT: "2g" # Limite de memória do sandbox
      SANDBOX_CPU_LIMIT: "1.0" # 1 CPU core para sandbox
      # Configurações de workspace otimizadas
      WORKSPACE_TIMEOUT: 600 # 10 minutos para operações
      MAX_WORKSPACE_SIZE: "5g" # 5GB max workspace
    ports:
      - "3000:3000"
    volumes:
      - ./workspace:/workspace
      - ./openhands:/.openhands
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - openhands-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-ai
    environment:
      # Configurações otimizadas para RTX 2050 + Qwen 2.5 Coder 7B
      - OLLAMA_CONTEXT_LENGTH=4096 # Reduzido para 4GB VRAM
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_MODEL=qwen2.5-coder:7b-instruct-q4_K_M
      - OLLAMA_GPU_LAYERS=35 # Ajustado para RTX 2050
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_KEEP_ALIVE=-1
      # Otimizações de performance
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_LOAD_TIMEOUT=600
      - OLLAMA_GPU_OVERHEAD=1073741824 # 1GB overhead
      - OLLAMA_BATCH_SIZE=256 # Reduzido para economizar VRAM
      - OLLAMA_F16=1
      - OLLAMA_PRELOAD=1
      - OLLAMA_TEMPERATURE=0.1
      - OLLAMA_TOP_K=40
      - OLLAMA_TOP_P=0.9
      - OLLAMA_REPEAT_PENALTY=1.1
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
      - ./workspace:/workspace
      - ./vscode:/vscode
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        ollama serve &
        sleep 5 &&
        ollama pull qwen2.5-coder:7b-instruct-q4_K_M &&
        wait
    networks:
      - openhands-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: "4g" # Reduzido para 4GB total
          cpus: "1.5" # Reduzido para 1.5 cores
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    runtime: nvidia

  open-webui:
    image: ghcr.io/open-webui/open-webui:ollama
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - ./open-webui:/app/backend/data
      - ./ollama:/root/.ollama
      - ./workspace:/workspace
      - ./vscode:/vscode
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OPENWEBUI_USERNAME: admin@admin.com
      OPENWEBUI_PASSWORD: admin
      ENABLE_MODEL_FILTER: true
      ENABLE_SIGNUP: true
      # Otimizações para baixa memória
      WEBUI_NAME: "OpenHands Lite"
      DEFAULT_MODELS: "qwen2.5-coder:7b-instruct-q4_K_M"
      ENABLE_RAG_WEB_SEARCH: true
      ENABLE_IMAGE_GENERATION: true
      # Forçar modo backend
      USE_CUDA_DOCKER: false
      WEBUI_SECRET_KEY: "dev-tools-ia-secret-key-2024"
      # Criar usuário admin automaticamente
      DEFAULT_USER_ROLE: "admin"
    networks:
      - openhands-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          memory: "1g"
          cpus: "1.0"
        reservations:
          memory: "512m"
          cpus: "0.5"

networks:
  openhands-net:
    name: openhands-net
