services:
  openhands-runtime:
    build:
      context: ./runtime
      dockerfile: Dockerfile
    image: openhands-runtime
    volumes:
      - ./workspace:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    runtime: nvidia
    networks:
      - openhands-net

  openhands:
    image: docker.openhands.dev/openhands/openhands:1.7
    container_name: openhands-app
    pull_policy: always
    environment:
      # LLM Configuration (Official V1)
      LLM_API_KEY: "${GEMINI_API_KEY}"
      LLM_MODEL: "gemini/gemini-3.1-flash-lite-preview"

      # Persistence (Official V1)
      OH_PERSISTENCE_DIR: /.openhands

      # Sandbox Provider (Official V1)
      RUNTIME: docker

      # Workspace Mounting (Official V1)
      SANDBOX_VOLUMES: ./workspace:/workspace:rw

      # Agent Server Configuration (Official V1)
      # Commented out - using SANDBOX_RUNTIME_CONTAINER_IMAGE with custom build instead
      # AGENT_SERVER_IMAGE_REPOSITORY: ghcr.io/openhands/agent-server
      # AGENT_SERVER_IMAGE_TAG: 1.19.1-python

      # Custom Sandbox Runtime Container Image
      # Uses locally built image with .NET SDK 10 support
      SANDBOX_RUNTIME_CONTAINER_IMAGE: openhands-runtime
      AGENT_SERVER_IMAGE_REPOSITORY: openhands-runtime

      # Logging
      LOG_ALL_EVENTS: true

      # GPU Support
      CUDA_VISIBLE_DEVICES: all
      NVIDIA_VISIBLE_DEVICES: all
      SANDBOX_DOCKER_RUNTIME: nvidia
    ports:
      - "3000:3000"
    volumes:
      - ./openhands:/.openhands
      - ./workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    runtime: nvidia
    deploy:
      resources:
        limits:
          memory: "4g"
          cpus: "2.0"
        reservations:
          memory: "2g"
          cpus: "1.0"
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - openhands-net

networks:
  openhands-net:
    name: openhands-net
    driver: bridge
