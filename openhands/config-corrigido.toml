# OpenHands Configuration File
# Versão corrigida e funcional - sem configurações conflitantes

[core]
# Core configuration
workspace_base = "./workspace"
main_config_path = "config.toml"

[sandbox]
# Network Configuration - ESCOLHER APENAS UMA OPÇÃO
# bridge = Mais seguro e recomendado
# host = Use com cuidado (conflitos de porta)
network_mode = "bridge"
use_host_network = false

# Instance Management
max_num_sandboxes = 1

# Resource Limits (sem aspas para números)
memory_limit = 16G
timeout = 240
user_id = "0"

[llm]
# LLM Configuration - Gemini API
# Usar provider "google" em vez de "gemini"
provider = "google"
model = "gemini-2.0-flash"
api_key = "SUA_CHAVE_AQUI"
temperature = 0.35
top_p = 0.95
max_iterations = 30
max_parallel_requests = 3
memory_budget = 4294967296

[workspace]
# Workspace Configuration
base = "./workspace"
mount_path = "./workspace"
timeout = 400

# NOTAS IMPORTANTES:
# 1. Não usar seções [devices] ou [performance] - não são suportadas
# 2. Não misturar network_mode com use_host_network - são opostos
# 3. Usar provider "google" em vez de "gemini"
# 4. Remover configurações conflitantes com environment variables
# 5. Para GPU: usar SANDBOX_DOCKER_RUNTIME=nvidia (fora do TOML)
