[devices]
driver = "nvidia"
count = "all"
capabilities = ["gpu"]
timeout = 240
user_id = "0"
workspace_size = "8g"
enable_gpu_acceleration = true

[llm]
provider = "gemini"
model = "gemini/gemini-2.5-flash"
temperature = 0.35
top_p = 0.95
max_iterations = 30
max_parallel_requests = 3
memory_budget = 4294967296
gpu_layers = 33

[workspace]
mount_path = "/workspace"
base = "/workspace"
timeout = 400

[performance]
load_timeout = 400
enable_auto_lint = true
cuda_visible_devices = "0"
