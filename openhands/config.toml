# OpenHands Configuration File
# Versão simplificada e compatível com schema oficial

[core]
# Core configuration
workspace_base = "./workspace"
main_config_path = "config.toml"

[sandbox]
# Network Configuration
network_mode = "bridge"
use_host_network = false

# Instance Management
max_num_sandboxes = 1

# Resource Limits
memory_limit = 16G
timeout = 240
user_id = "0"

[llm]
# LLM Configuration - Gemini API
provider = "google"
model = "gemini-2.0-flash"
api_key = "SUA_CHAVE_AQUI"
temperature = 0.35
top_p = 0.95
max_iterations = 30
max_parallel_requests = 3
memory_budget = 4294967296

# NOTAS:
# 1. Apenas seções suportadas: [core], [sandbox], [llm]
# 2. Removidas seções não reconhecidas: [devices], [workspace], [performance]
# 3. GPU configurada via environment variables no docker-compose.yml
# 4. Configurações de workspace via environment variables
