services:
  openhands:
    image: docker.openhands.dev/openhands/openhands:1.5
    container_name: openhands-hands-app-low
    pull_policy: always
    init: true
    environment:
      LOG_ALL_EVENTS: "false"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      AGENT_SERVER_IMAGE_REPOSITORY: "ghcr.io/openhands/agent-server"
      AGENT_SERVER_IMAGE_TAG: "1.12.0-python"
      OPENHANDS_LLM_PROVIDER: gemini
      OPENHANDS_LLM_MODEL: gemini/gemini-2.5-flash
      OPENHANDS_LLM_TEMPERATURE: 0.2
      OPENHANDS_LLM_TOP_P: 0.95
      OPENHANDS_MAX_ITERATIONS: 15
      OPENHANDS_ENABLE_AUTO_LINT: true
      WORKSPACE_MOUNT_PATH: /workspace
      WORKSPACE_BASE: /workspace
      OPENHANDS_LLM_GPU_LAYERS: 0
      # Low-resource config: user requested larger context; ensure runtime/model supports this.
      ALLOW_SHORT_CONTEXT_WINDOWS: true
      OPENHANDS_LOAD_TIMEOUT: 180
      OPENHANDS_MAX_PARALLEL_REQUESTS: 1
      OPENHANDS_MEMORY_BUDGET: 1073741824
      CUDA_VISIBLE_DEVICES: ""
      SANDBOX_TIMEOUT: 120
      SANDBOX_USER_ID: "0"
      SANDBOX_MEMORY_LIMIT: "2g"
      SANDBOX_CPU_LIMIT: "0.5"
      WORKSPACE_TIMEOUT: 180
      MAX_WORKSPACE_SIZE: "2g"
    ports:
      - "3000:3000"
    volumes:
      - ./workspace:/workspace
      - ./openhands:/.openhands
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - openhands-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tty: true
    stdin_open: true
    deploy:
      resources:
        limits:
          memory: "512m"
          cpus: "0.5"
        reservations:
          memory: "256m"
          cpus: "0.2"
networks:
  openhands-net:
    name: openhands-net
    driver: bridge
